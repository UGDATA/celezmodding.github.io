<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CelezMods</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Raleway', sans-serif;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(120, 40, 200, 0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .corner-title {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 10;
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #a855f7;
      text-shadow: 0 0 18px rgba(168, 85, 247, 0.6), 0 0 40px rgba(168, 85, 247, 0.2);
    }

    .corner-title .dot {
      color: #d8b4fe;
    }

    .center {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      gap: 20px;
    }

    .coming-soon {
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      font-size: clamp(22px, 5vw, 52px);
      letter-spacing: 0.35em;
      color: #c084fc;
      text-shadow: 0 0 24px rgba(192, 132, 252, 0.5), 0 0 60px rgba(168, 85, 247, 0.2);
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% {
        text-shadow: 0 0 20px rgba(192, 132, 252, 0.4), 0 0 50px rgba(168, 85, 247, 0.15);
        opacity: 1;
      }
      50% {
        text-shadow: 0 0 35px rgba(192, 132, 252, 0.75), 0 0 80px rgba(168, 85, 247, 0.35);
        opacity: 0.85;
      }
    }

    .divider {
      width: clamp(80px, 20vw, 180px);
      height: 1px;
      background: linear-gradient(90deg, transparent, #7e22ce, transparent);
      opacity: 0.6;
    }

    .dots {
      display: inline-block;
      animation: blink-dots 1.4s step-end infinite;
    }

    @keyframes blink-dots {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="corner-title">Celez8's Modding Hub<span class="dot">.</span></div>

  <div class="center">
    <div class="divider"></div>
    <div class="coming-soon">coming soon<span class="dots">..</span></div>
    <div class="divider"></div>
  </div>

</body>
</html>
